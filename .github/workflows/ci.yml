name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

env:
  NODE_VERSION: "20"

jobs:
  python:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,server,api]"

      - name: Run ruff
        run: ruff check mimir

      - name: Run mypy
        run: mypy mimir

      - name: Run pytest
        run: python -m pytest --tb=short

  typescript:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: plugins/opencode/package-lock.json

      - name: Install OpenCode plugin dependencies
        working-directory: plugins/opencode
        run: npm ci

      - name: Type-check OpenCode plugin
        working-directory: plugins/opencode
        run: npm run typecheck
